; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs =
	;arduino-nesso-n1
	;CYD-2432S028
	;CYD-2-USB
	;CYD-2432W328C
	;CYD-2432W328C_2 # Inverted colors and common to 2.4" capacitive display?
	;CYD-2432S024R
	;CYD-2432W328R
	;CYD-2432S022C
	;CYD-2432S032C
	;CYD-2432S032R
	;CYD-3248S035C
	;CYD-3248S035R
	;CYD-8048S043C
	;CYD-8048W550C
	;NM-CYD-C5
	;CYD-3248W535C
	;CYD-4827S043R
	;headless-esp32-4mb
	;headless-esp32-8mb
	;headless-esp32s3-4mb
	;headless-esp32s3-8mb
	;headless-esp32s3-16mb
	;elecrow-24B
	;elecrow-28B
	;elecrow-35B
	;elecrow-35Bv2_2
	;lilygo-t-deck-pro
	;lilygo-t-deck
	;lilygo-t-display-S3-amoled
	;lilygo-t-display-S3-amoled-plus
	;lilygo-t-display-S3-pro
	;lilygo-t-display-S3-touch
	;lilygo-t-dongle-s3-tft
	;lilygo-t-dongle-c5-tft
	;lilygo-t-embed
	;lilygo-t-embed-cc1101
	;lilygo-t-lora-pager
	;lilygo-t5-epaper-s3-pro
	;lilygo-t-hmi
	;lilygo-t-watch-s3
	;lilygo-t-watch-ultra
	m5stack-cardputer # ADV is in this env
	;m5stack-core
	;m5stack-core-4Mb
	;m5stack-core2
	;m5stack-cores3
	;m5stack-cplus1_1
	;m5stack-c
	;m5stack-cplus2
	;m5stack-dinmeter
	;m5stack-tab5
	;m5stack-paper
	;m5stack-paper-s3
	;m5stack-sticks3
	;Marauder-Mini
	;Marauder-v7
	;Awok-Mini
	;Marauder-v4-OG
	;Marauder-v61
	;Awok-Touch
	;Phantom_S024R
	;reaper
	;smoochiee-board
	;WaveSentry-R1
	;waveshare-esp32-s3-lcd-147
	;freenove-fnk0104b

boards_dir = boards/_jsonfiles

# Setup for common usage
build_cache_dir = .pio/buildcache
cache_dir = .pio/cache
core_dir = .pio/core

# Setup for codespaces
; build_dir = /tmp/.pio/build
; build_cache_dir = /tmp/.pio/buildcache
; cache_dir = /tmp/.pio/cache
; core_dir = /tmp/.pio/core

extra_configs =
	boards/*.ini
	boards/*/*.ini

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.32/platform-espressif32.zip
platform_packages =
	framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/esp32-arduino-libs-20251001-233155.zip
	#framework-arduinoespressif32-libs @ https://github.com/bmorcelli/esp32-arduino-lib-builder/releases/download/idf-release_v5.5/esp32-arduino-libs-20250923-034239.zip
monitor_filters = esp32_exception_decoder, send_on_enter, colorize
monitor_speed = 115200
framework = arduino
lib_extra_dirs = lib_modules
board_build.variants_dir = boards
board_upload.offset_address = 0x10000
extra_scripts =
	pre:support_files/check_submodules.py
	pre:support_files/prep_web_files.py
	support_files/enable_lto.py
	pre:support_files/upload_patch.py
	post:support_files/merge.py
build_flags =
	-DLAUNCHER='"dev"'
	-DWIFI_ENC_KEY='"LauncherWifi2025!"'
	-DMAXFILES=256
	-DCONFIG_FILE='"/config.conf"'
	-flto
	-fno-exceptions
	-w
	-Wl,--print-memory-usage
	-Wl,--gc-sections
	#-DCORE_DEBUG_LEVEL=5 #debug
	-DCORE_DEBUG_LEVEL=0
	-DCONFIG_ESP32_JTAG_SUPPORT_DISABLE=1
	-Os

